<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly Bridge 4</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 120% at 50% 0%,#13284a 0%,#0a1426 70%);
    color:#e7ecf5;font-family:"Segoe UI",system-ui,sans-serif;user-select:none;overflow:hidden}
  #game{position:fixed;inset:0;overflow:hidden}
  canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;
    background:#16335c;cursor:crosshair;display:block}

  /* painel flutuante de vidro */
  .hud{position:absolute;z-index:5;background:rgba(13,26,48,.82);
    border:1px solid rgba(120,160,220,.28);border-radius:16px;
    backdrop-filter:blur(8px);box-shadow:0 10px 34px #0007;
    padding:10px 12px;display:flex;align-items:center;gap:10px}

  /* HUD canto sup-esq: marca + dinheiro */
  .hud-tl{top:14px;left:14px;flex-direction:column;align-items:flex-start;gap:8px}
  .brand{font-weight:800;font-size:17px;letter-spacing:1.5px}
  .brand span{color:#ffd23f}
  .money{display:flex;gap:8px}
  .mItem{display:flex;flex-direction:column;background:rgba(8,18,36,.7);
    border:1px solid rgba(90,130,190,.3);border-radius:10px;padding:5px 10px;min-width:78px}
  .mItem .mlbl{font-size:9px;letter-spacing:1px;color:#8aa6d0}
  .mItem b{font-size:15px;color:#fff}
  .mItem.bad b{color:#ff6b6b}

  /* seletor de níveis sup-centro */
  .hud-top{top:14px;left:50%;transform:translateX(-50%);gap:5px;padding:7px 9px}
  .lv{background:transparent;border:1px solid transparent;color:#cdd7ee;
    padding:6px 9px;border-radius:10px;cursor:pointer;font-size:15px;transition:.12s}
  .lv:hover{background:rgba(28,58,102,.7)}
  .lv.active{background:#2f7df6;color:#fff;box-shadow:0 2px 14px #2f7df655}

  /* veículos sup-dir */
  .hud-tr{top:14px;right:14px;gap:8px}
  .cap{font-size:9px;letter-spacing:1px;color:#8aa6d0}
  .cars{display:flex;gap:5px}
  .veh{width:38px;height:38px;font-size:18px;background:rgba(19,40,74,.6);
    border:1px solid rgba(90,130,190,.3);border-radius:11px;cursor:pointer;transition:.12s}
  .veh:hover{background:rgba(28,58,102,.9)}
  .veh.active{background:#2f7df6;border-color:#7fb0ff;box-shadow:0 2px 12px #2f7df655}

  /* paleta de materiais (build menu — assinatura do Poly Bridge) */
  .palette{bottom:18px;left:50%;transform:translateX(-50%);gap:8px;padding:10px}
  .tile{position:relative;width:80px;height:74px;border-radius:14px;cursor:pointer;
    background:rgba(10,20,38,.7);border:1.5px solid rgba(90,130,190,.32);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    color:#cdd7ee;transition:transform .12s,box-shadow .12s,border-color .12s}
  .tile:hover{transform:translateY(-3px);border-color:rgba(150,185,240,.6)}
  .tile.active{transform:translateY(-8px);border-color:#ffd23f;
    box-shadow:0 10px 26px #000a,0 0 0 2px #ffd23f inset}
  .tile .ico{width:42px;height:12px;border-radius:4px;border:1px solid #0007;box-shadow:0 1px 0 #fff3 inset}
  .tile .tn{font-size:11px;font-weight:700}
  .tile .tk{position:absolute;top:5px;right:6px;font-size:9px;background:rgba(0,0,0,.4);
    border:1px solid #ffffff22;border-radius:5px;padding:0 4px;color:#aec4e6}

  /* ferramentas inf-esq */
  .hud-bl{bottom:18px;left:14px;gap:8px;background:none;border:none;box-shadow:none;backdrop-filter:none;padding:0}
  .rbtn{width:48px;height:48px;border-radius:50%;font-size:18px;cursor:pointer;
    background:rgba(13,26,48,.85);border:1px solid rgba(120,160,220,.3);color:#e7ecf5;
    backdrop-filter:blur(6px);box-shadow:0 8px 24px #0006;transition:.12s}
  .rbtn:hover{background:rgba(28,58,102,.95)}

  /* botão PLAY redondo inf-dir */
  .play{position:absolute;z-index:6;bottom:18px;right:18px;width:78px;height:78px;border-radius:50%;
    font-size:30px;color:#06210f;cursor:pointer;border:none;
    background:radial-gradient(circle at 35% 30%,#7ef0a0,#23c55e);
    box-shadow:0 10px 30px #0008,0 0 0 4px #ffffff14;transition:.12s}
  .play:hover{filter:brightness(1.08);transform:scale(1.05)}
  .play.on{background:radial-gradient(circle at 35% 30%,#ff9a8a,#ef4444);color:#2a0707}

  /* aviso de objetivo (toast) */
  #hint{position:absolute;z-index:4;top:62px;left:50%;transform:translateX(-50%);
    max-width:560px;background:rgba(10,23,48,.92);border:1px solid rgba(90,130,190,.35);
    padding:10px 15px;border-radius:12px;font-size:12.5px;line-height:1.55;
    text-align:center;backdrop-filter:blur(6px);box-shadow:0 8px 24px #0006}
  #hint b{color:#ffd23f}

  /* banner de fim */
  #banner{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    flex-direction:column;background:rgba(6,16,31,.86);text-align:center;gap:14px;backdrop-filter:blur(3px)}
  #banner.show{display:flex}
  #banner h1{font-size:48px}
  .row{display:flex;gap:10px;align-items:center}
  .btnbig{background:#2f7df6;border:none;color:#fff;padding:11px 24px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
  .btnbig:hover{background:#4a92ff}
  .small{font-size:12px;color:#9fb6d0}
  kbd{background:#1e3258;border:1px solid #3a5a8c;border-radius:5px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
<div id="game">
  <canvas id="cv" width="1000" height="560"></canvas>

  <div class="hud hud-tl">
    <div class="brand">POLY BRIDGE <span>4</span></div>
    <div class="money">
      <div class="mItem"><span class="mlbl">ORÇAMENTO</span><b id="budget">$0</b></div>
      <div class="mItem"><span class="mlbl">CUSTO</span><b id="cost">$0</b></div>
      <div class="mItem"><span class="mlbl">🏆 RECORDE</span><b id="best">—</b></div>
    </div>
  </div>

  <div class="hud hud-top">
    <button class="lv lvl" data-lvl="0" title="Tutorial">🟢</button>
    <button class="lv lvl" data-lvl="1" title="Fácil">🔵</button>
    <button class="lv lvl" data-lvl="2" title="Médio">🟠</button>
    <button class="lv lvl" data-lvl="3" title="Difícil">🔴</button>
    <button class="lv lvl" data-lvl="4" title="Impossível">💀</button>
    <button class="lv lvl" data-lvl="5" title="Livre">🧪</button>
  </div>

  <div class="hud hud-tr">
    <span class="cap">VEÍCULO</span>
    <div class="cars">
      <button class="veh car" data-car="bike" title="Moto">🏍️</button>
      <button class="veh car" data-car="car" title="Carro">🚗</button>
      <button class="veh car" data-car="truck" title="Caminhão">🚚</button>
      <button class="veh car" data-car="bus" title="Ônibus">🚌</button>
      <button class="veh car" data-car="tank" title="Tanque">🚜</button>
    </div>
    <button id="btnMute" class="rbtn" style="width:38px;height:38px;font-size:15px" title="Som">🔊</button>
  </div>

  <div id="hint"></div>

  <div class="hud palette">
    <button class="tile mat" data-mat="road"><span class="tk">1</span><span class="ico" style="background:#3a3f4d"></span><span class="tn">Estrada</span></button>
    <button class="tile mat" data-mat="wood"><span class="tk">2</span><span class="ico" style="background:#c98a4b"></span><span class="tn">Madeira</span></button>
    <button class="tile mat" data-mat="steel"><span class="tk">3</span><span class="ico" style="background:#9fb6d4"></span><span class="tn">Aço</span></button>
    <button class="tile mat" data-mat="cable"><span class="tk">4</span><span class="ico" style="background:#ff6b5a;height:5px"></span><span class="tn">Cabo</span></button>
  </div>

  <div class="hud hud-bl">
    <button id="btnUndo" class="rbtn" title="Desfazer (Z)">↶</button>
    <button id="btnClear" class="rbtn" title="Limpar tudo">🗑</button>
  </div>

  <button id="btnRun" class="play" title="Simular (espaço)">▶</button>

  <div id="banner"><h1 id="bttl"></h1><div id="bsub" class="small"></div>
    <div class="row">
      <button class="btnbig" id="bretry">↻ Tentar de novo <kbd>R</kbd></button>
      <button class="btnbig" id="bbtn" style="background:#2c4d80">OK</button>
    </div></div>
</div>

<script>
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;

/* ===== MATERIAIS ===== */
const MAT={
  road : {name:'Estrada',cost:12,maxStrain:0.120,stiff:0.92,road:true ,cableOnly:false,color:'#3a3f4d',edge:'#11141c',w:9},
  wood : {name:'Madeira',cost:7 ,maxStrain:0.050,stiff:0.80,road:false,cableOnly:false,color:'#c98a4b',edge:'#7d4f23',w:7},
  steel: {name:'Aço'    ,cost:26,maxStrain:0.110,stiff:1.00,road:false,cableOnly:false,color:'#9fb6d4',edge:'#536krap',w:6},
  cable: {name:'Cabo'   ,cost:6 ,maxStrain:0.150,stiff:1.00,road:false,cableOnly:true ,color:'#ff6b5a',edge:'#a83327',w:3},
};
MAT.steel.edge='#536785';
/* ===== VEÍCULOS ===== */
const CARS={
  bike :{label:'Moto'    ,mass:0.6,wheelR:9 ,len:34,color:'#39d98a',emoji:'🏍️'},
  car  :{label:'Carro'   ,mass:1.5,wheelR:11,len:44,color:'#ffd23f',emoji:'🚗'},
  truck:{label:'Caminhão',mass:3.2,wheelR:13,len:60,color:'#4aa3ff',emoji:'🚚'},
  bus  :{label:'Ônibus'  ,mass:4.5,wheelR:13,len:74,color:'#ff8c42',emoji:'🚌'},
  tank :{label:'Tanque'  ,mass:6.0,wheelR:15,len:64,color:'#b06bff',emoji:'🚜'},
};

/* ===== NÍVEIS ===== */
const LEVELS=[
 {name:'Tutorial',budget:700,accent:'#1c5e3a',hazard:'água',car:'bike',
  ground:[{x:0,y:392,w:336,h:170},{x:664,y:392,w:336,h:170}],
  anchors:[[336,392],[664,392]],
  carStart:[120,372],goalX:760,
  hint:'Ligue os 2 <b>pontos âncora</b>. <b>Segure e arraste</b> de um ponto ao outro para desenhar a estrada em cadeia (igual Poly Bridge). <b>Botão direito</b> apaga uma viga. <b>▶ Simular</b> quando pronto.'},

 {name:'Fácil',budget:1300,accent:'#1c5e3a',hazard:'água',car:'car',
  ground:[{x:0,y:404,w:288,h:158},{x:712,y:404,w:288,h:158}],
  anchors:[[288,404],[712,404]],
  carStart:[110,384],goalX:800,
  hint:'Vão maior + carro mais pesado. Só estrada vai afundar e romper (fica vermelha). Reforce por baixo com <b>Madeira/Aço</b> formando <b>triângulos</b> — triângulo não dobra.'},

 {name:'Médio',budget:2000,accent:'#5e4a1c',hazard:'penhasco',car:'truck',
  ground:[{x:0,y:412,w:236,h:150},{x:470,y:300,w:90,h:262},{x:764,y:412,w:236,h:150}],
  anchors:[[236,412],[470,300],[560,300],[764,412]],
  carStart:[100,392],goalX:850,
  hint:'Pilar no meio + caminhão pesado. <b>Cabos</b> (4) só puxam — pendure-os do alto como ponte estaiada. Combine com treliça de aço.'},

 {name:'Difícil',budget:2300,accent:'#5e2a1c',hazard:'água',car:'bus',
  ground:[{x:0,y:420,w:250,h:142},{x:750,y:420,w:250,h:142}],
  anchors:[[250,420],[250,300],[750,300],[750,420]],
  carStart:[110,400],goalX:845,
  hint:'Vão largo + <b>ônibus pesado</b>. Use as <b>torres</b> das pontas para uma treliça funda de aço com diagonais em X (cada quadrado vira triângulo). Cabos ajudam a segurar o meio.'},

 {name:'Impossível',budget:2600,accent:'#5e1c1c',hazard:'LAVA',car:'tank',
  ground:[{x:0,y:436,w:188,h:126},{x:812,y:436,w:188,h:126}],
  anchors:[[188,436],[188,288],[812,288],[812,436]],
  carStart:[80,416],goalX:892,
  hint:'Vão enorme sobre a lava + <b>tanque de 7t</b> + orçamento curto. Use as <b>torres altas</b> das pontas: cabos do alto + treliça de aço com X. Estrada pura não tem chance. 💀'},

 {name:'Livre',budget:9999,accent:'#1c3a5e',hazard:'água',car:'car',
  ground:[{x:0,y:412,w:300,h:150},{x:700,y:412,w:300,h:150}],
  anchors:[[300,412],[700,412]],
  carStart:[120,392],goalX:800,
  sandbox:true,
  hint:'<b>Modo livre 🧪</b>: orçamento gigante, troque o veículo à vontade e teste qualquer estrutura. Sem pressão — só diversão e experimentos.'},
];

/* ===== ESTADO ===== */
let curLevel=0,curMat='road',curCar='car';
let points=[],beams=[],history=[];
let running=false,simTime=0,gameResult=null,car=null;
let sparks=[],frame=0;
/* ===== ÁUDIO (WebAudio, sem arquivos) ===== */
let actx=null,muted=false,engOsc=null,engGain=null,engF=null;
function audioInit(){if(actx)return;try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function audioResume(){audioInit();if(actx&&actx.state==='suspended')actx.resume();}
function beep(freq,dur,type,vol,when){if(!actx||muted)return;const t=actx.currentTime+(when||0);
  const o=actx.createOscillator(),g=actx.createGain();o.type=type||'square';o.frequency.value=freq;
  g.gain.value=0;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol||0.07,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);}
function snapSound(){if(!actx||muted)return;const n=Math.floor(actx.sampleRate*0.13);
  const b=actx.createBuffer(1,n,actx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.2);
  const s=actx.createBufferSource();s.buffer=b;const g=actx.createGain();g.gain.value=0.22;
  const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=1400;
  s.connect(f);f.connect(g);g.connect(actx.destination);s.start();}
function engineStart(){if(!actx||muted||engOsc)return;engOsc=actx.createOscillator();engGain=actx.createGain();
  engF=actx.createBiquadFilter();engF.type='lowpass';engF.frequency.value=600;
  engOsc.type='sawtooth';engOsc.frequency.value=60;engGain.gain.value=0.0;
  engOsc.connect(engF);engF.connect(engGain);engGain.connect(actx.destination);engOsc.start();}
function engineStop(){if(engOsc){try{engOsc.stop();}catch(e){}engOsc=null;engGain=null;engF=null;}}
function engineUpdate(spd){if(!engOsc)return;const tgt=Math.min(0.05,0.012+spd*0.02);
  engGain.gain.value+=(tgt-engGain.gain.value)*0.2;engOsc.frequency.value=55+spd*45;}
function winJingle(){beep(523,0.13,'square',0.08,0);beep(659,0.13,'square',0.08,0.12);beep(784,0.22,'square',0.09,0.24);beep(1046,0.3,'triangle',0.08,0.42);}
function loseSound(){beep(180,0.5,'sawtooth',0.09,0);beep(120,0.6,'sawtooth',0.08,0.08);}
const GRID=28, SNAP=20, MAX_BEAM=156, GRAV=0.5, DAMP=0.99, SUB=6, ITER=8;
const best=JSON.parse(localStorage.getItem('pb4_best')||'{}');

/* ===== HELPERS ===== */
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function addPoint(x,y,pinned){const p={x,y,px:x,py:y,pinned:!!pinned,invMass:pinned?0:1};points.push(p);return p;}
function findNode(x,y,r){r=r||SNAP;let b=null,bd=r;for(const p of points){const d=Math.hypot(p.x-x,p.y-y);if(d<bd){bd=d;b=p;}}return b;}
function snap(x,y){return {x:Math.round(x/GRID)*GRID, y:Math.round(y/GRID)*GRID};}
function onGround(x,y){return LEVELS[curLevel].ground.some(g=>x>=g.x-3&&x<=g.x+g.w+3&&y>=g.y-2&&y<=g.y+g.h);}
function totalCost(){let c=0;for(const b of beams)c+=dist(b.a,b.b)/100*MAT[b.mat].cost;return Math.round(c);}
function ptSeg(p,a,b){const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;let t=l2?((p.x-a.x)*dx+(p.y-a.y)*dy)/l2:0;t=Math.max(0,Math.min(1,t));return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));}

/* ===== NÍVEL ===== */
function loadLevel(i){
  curLevel=i;running=false;gameResult=null;car=null;simTime=0;sparks=[];
  points=[];beams=[];history=[];
  const L=LEVELS[i];
  L.anchors.forEach(a=>addPoint(a[0],a[1],true));
  curCar=L.car;
  document.querySelectorAll('.car').forEach(b=>b.classList.toggle('active',b.dataset.car===curCar));
  document.querySelectorAll('.lvl').forEach(b=>b.classList.toggle('active',+b.dataset.lvl===i));
  document.getElementById('budget').textContent='$'+L.budget;
  const h=document.getElementById('hint');h.innerHTML=L.hint;h.style.display='block';
  updateHUD();
}
function updateHUD(){
  const c=totalCost(),L=LEVELS[curLevel];
  const e=document.getElementById('cost');e.textContent='$'+c;e.parentElement.classList.toggle('bad',c>L.budget);
  document.getElementById('best').textContent=best[curLevel]!=null?'$'+best[curLevel]:'—';
}

/* ===== CONSTRUÇÃO (grid + arrasto em cadeia) ===== */
let mouse={x:0,y:0},drawing=false,lastNode=null,stroke=null,erasing=false;
function eraseAt(m){let bi=-1,bd=11;beams.forEach((b,i)=>{const d=ptSeg(m,b.a,b.b);if(d<bd){bd=d;bi=i;}});
  if(bi>=0){beams.splice(bi,1);cleanOrphans();updateHUD();return true;}return false;}
function evt(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
function getOrCreate(x,y){
  const n=findNode(x,y);if(n)return n;
  const s=snap(x,y);const e=findNode(s.x,s.y,GRID*0.5);if(e)return e;
  const p=addPoint(s.x,s.y,false);if(stroke)stroke.pts.push(p);return p;
}
function tryBeam(a,b){
  if(!a||!b||a===b)return;
  const d=dist(a,b);if(d<10||d>MAX_BEAM)return;
  if(beams.some(x=>(x.a===a&&x.b===b)||(x.a===b&&x.b===a)))return;
  const bm={a,b,rest:d,mat:curMat,broken:false,strain:0};
  beams.push(bm);if(stroke)stroke.beams.push(bm);
  updateHUD();
}
cv.addEventListener('mousedown',e=>{
  if(running)return;
  if(e.button===2){erasing=true;eraseAt(evt(e));return;}
  const m=evt(e);mouse=m;
  stroke={beams:[],pts:[]};
  const start=findNode(m.x,m.y) || (onGround(m.x,m.y)?null:getOrCreate(m.x,m.y));
  if(!start){stroke=null;return;}
  drawing=true;lastNode=start;
});
cv.addEventListener('mousemove',e=>{
  mouse=evt(e);
  if(erasing){eraseAt(mouse);return;}
  if(!drawing)return;
  let tgt=findNode(mouse.x,mouse.y);
  if(!tgt){
    if(onGround(mouse.x,mouse.y))return;
    const s=snap(mouse.x,mouse.y);
    if(Math.hypot(s.x-lastNode.x,s.y-lastNode.y)<GRID*0.8)return;
    if(Math.hypot(s.x-lastNode.x,s.y-lastNode.y)>MAX_BEAM)return;
    tgt=getOrCreate(s.x,s.y);
  }
  if(tgt&&tgt!==lastNode){tryBeam(lastNode,tgt);lastNode=tgt;}
});
window.addEventListener('mouseup',()=>{
  if(erasing){erasing=false;return;}
  if(!drawing){stroke=null;return;}
  drawing=false;
  if(stroke&&stroke.beams.length)history.push(stroke);
  else if(stroke){stroke.pts.forEach(p=>{if(!beams.some(b=>b.a===p||b.b===p))points=points.filter(x=>x!==p);});}
  stroke=null;lastNode=null;
});
cv.addEventListener('contextmenu',e=>e.preventDefault()); // apagar é via arrastar com o botão direito
function cleanOrphans(){points=points.filter(p=>p.pinned||beams.some(b=>b.a===p||b.b===p));}

/* ===== SIMULAÇÃO ===== */
function startSim(){
  const L=LEVELS[curLevel];
  if(beams.length===0){flash('Construa algo!','Conecte os pontos âncora primeiro.');return;}
  if(totalCost()>L.budget){flash('Acima do orçamento!','Deixe o custo abaixo de $'+L.budget+'.');return;}
  running=true;gameResult=null;simTime=0;sparks=[];
  const rb=document.getElementById('btnRun');rb.textContent='⏹';rb.classList.add('on');
  document.getElementById('hint').style.display='none';
  const C=CARS[curCar],s=L.carStart,h=C.len/2;
  const lw=addPoint(s[0]-h,s[1],false),rw=addPoint(s[0]+h,s[1],false),bd=addPoint(s[0],s[1]-22,false);
  const im=1/C.mass;lw.invMass=rw.invMass=im;bd.invMass=im*1.2;lw.car=rw.car=bd.car=true;
  const sb=(a,b)=>({a,b,rest:dist(a,b),mat:'steel',broken:false,strain:0,carBeam:true});
  car={lw,rw,bd,R:C.wheelR,beams:[sb(lw,rw),sb(lw,bd),sb(rw,bd)],_maxx:s[0],_stuck:0,_spin:0};
  audioResume();engineStart();
}
function stopSim(){
  running=false;gameResult=null;engineStop();
  {const rb=document.getElementById('btnRun');rb.textContent='▶';rb.classList.remove('on');}
  if(car){points=points.filter(p=>!p.car);car=null;}
  for(const b of beams){b.broken=false;b.strain=0;}
  document.getElementById('hint').style.display='block';updateHUD();
}
function physics(){
  const sg=GRAV/SUB;
  for(let s=0;s<SUB;s++){
    for(const p of points){if(p.invMass===0)continue;
      const vx=(p.x-p.px)*DAMP,vy=(p.y-p.py)*DAMP;p.px=p.x;p.py=p.y;p.x+=vx;p.y+=vy+sg;}
    for(let it=0;it<ITER;it++){
      solve(beams,it===0);
      if(car)solve(car.beams,false);
      collide();
    }
    // tração: avanço de posição (move x e px juntos -> não vira velocidade que o vínculo amortece)
    if(car){const spd=2.4;for(const w of[car.lw,car.rw]){if(w._g){w.x+=spd;w.px+=spd;}}car.lw._g=car.rw._g=false;}
  }
  if(simTime>45){
    for(const b of beams){if(b.broken)continue;const m=MAT[b.mat];let st=b.strain;if(m.cableOnly&&st<0)st=0;
      if(Math.abs(st)>m.maxStrain){b.broken=true;spark(b);} }
  }
  if(car){
    // detecção de "atolado": ponte afunda e o carro não progride -> derrota limpa
    if(car.bd.x>car._maxx+0.4){car._maxx=car.bd.x;car._stuck=0;}else{car._stuck=(car._stuck||0)+1;}
    if(car.bd.y>H+90)gameResult='lose';
    else if(car.bd.x>LEVELS[curLevel].goalX)gameResult='win';
    else if(simTime>120&&car._stuck>240)gameResult='lose';
    if(gameResult)finishSim();
  }
  for(const s of sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=0.3;s.life--;}
  sparks=sparks.filter(s=>s.life>0);
  simTime++;
}
function solve(list,rec){
  for(const b of list){if(b.broken)continue;
    const a=b.a,c=b.b;let dx=c.x-a.x,dy=c.y-a.y,d=Math.hypot(dx,dy);if(d===0)continue;
    const strain=(d-b.rest)/b.rest;if(rec)b.strain=b.strain*0.92+strain*0.08;
    const m=b.carBeam?{stiff:1,cableOnly:false}:MAT[b.mat];
    if(m.cableOnly&&strain<0)continue;
    const w=a.invMass+c.invMass;if(w===0)continue;
    const diff=((d-b.rest)/d)*m.stiff;
    a.x+=dx*diff*(a.invMass/w);a.y+=dy*diff*(a.invMass/w);
    c.x-=dx*diff*(c.invMass/w);c.y-=dy*diff*(c.invMass/w);
  }
}
function collide(){
  if(!car)return;const L=LEVELS[curLevel];
  for(const w of[car.lw,car.rw]){
    for(const g of L.ground){
      if(w.x>g.x-2&&w.x<g.x+g.w+2&&w.y+car.R>g.y&&w.y<g.y+34){if(w.y<g.y){w.y=g.y-car.R;w._g=true;}}}
    for(const b of beams){
      if(b.broken||!MAT[b.mat].road)continue;
      const a=b.a,c=b.b,dx=c.x-a.x,dy=c.y-a.y,l2=dx*dx+dy*dy;if(!l2)continue;
      let t=((w.x-a.x)*dx+(w.y-a.y)*dy)/l2;t=Math.max(0,Math.min(1,t));
      const qx=a.x+t*dx,qy=a.y+t*dy;let nx=w.x-qx,ny=w.y-qy,dd=Math.hypot(nx,ny);
      if(dd<car.R&&dd>0.001){nx/=dd;ny/=dd;const pen=car.R-dd;
        const wm=w.invMass,sm=(a.invMass+c.invMass)*0.5+1e-4,tot=wm+sm;
        w.x+=nx*pen*(wm/tot);w.y+=ny*pen*(wm/tot);
        const ps=pen*(sm/tot);a.x-=nx*ps*(1-t);a.y-=ny*ps*(1-t);c.x-=nx*ps*t;c.y-=ny*ps*t;
        if(ny<0.4)w._g=true;}
    }
  }
}
function spark(b){const mx=(b.a.x+b.b.x)/2,my=(b.a.y+b.b.y)/2;for(let i=0;i<14;i++)sparks.push({x:mx,y:my,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:24+Math.random()*16});snapSound();}
function finishSim(){
  const L=LEVELS[curLevel];engineStop();
  if(gameResult==='win'){winJingle();const c=totalCost();
    if(L.sandbox){flash('🎉 ATRAVESSOU!','Modo livre — custo: $'+c+'. Boa! 🧪');}
    else{const nb=best[curLevel]==null||c<best[curLevel];
      if(nb){best[curLevel]=c;localStorage.setItem('pb4_best',JSON.stringify(best));}
      flash('🎉 ATRAVESSOU!','Custo: $'+c+'  •  Recorde: $'+best[curLevel]+(nb?'  (novo recorde!)':''));}
  }else{loseSound();flash('💥 DESABOU!','A ponte não aguentou. Reforce os pontos vermelhos com triângulos (X).');}
  running=false;{const rb=document.getElementById('btnRun');rb.textContent='▶';rb.classList.remove('on');}
}

/* ===== BANNER ===== */
function flash(t,s){document.getElementById('bttl').textContent=t;document.getElementById('bsub').textContent=s;document.getElementById('banner').classList.add('show');}
function clearCar(){if(car){points=points.filter(p=>!p.car);car=null;}for(const b of beams){b.broken=false;b.strain=0;}}
function closeBanner(){document.getElementById('banner').classList.remove('show');clearCar();running=false;engineStop();
  document.getElementById('hint').style.display='block';
  {const rb=document.getElementById('btnRun');rb.textContent='▶';rb.classList.remove('on');}updateHUD();}
function retrySim(){document.getElementById('banner').classList.remove('show');clearCar();startSim();}
document.getElementById('bbtn').onclick=closeBanner;
document.getElementById('bretry').onclick=retrySim;

/* ===== RENDER (estilo blueprint Poly Bridge) ===== */
function strainColor(b){const m=MAT[b.mat];let s=Math.min(1,Math.abs(b.strain)/m.maxStrain);
  const r=Math.round(70+185*Math.min(1,s*1.7)),g=Math.round(205-185*s);return `rgb(${r},${g},90)`;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawBg(){
  const L=LEVELS[curLevel];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#18365f');g.addColorStop(1,'#0e2244');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // grade fina + grossa (papel de projeto)
  ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,0.045)';
  ctx.beginPath();for(let x=0;x<=W;x+=GRID){ctx.moveTo(x,0);ctx.lineTo(x,H);}for(let y=0;y<=H;y+=GRID){ctx.moveTo(0,y);ctx.lineTo(W,y);}ctx.stroke();
  ctx.lineWidth=1.2;ctx.strokeStyle='rgba(255,255,255,0.10)';
  ctx.beginPath();for(let x=0;x<=W;x+=GRID*4){ctx.moveTo(x,0);ctx.lineTo(x,H);}for(let y=0;y<=H;y+=GRID*4){ctx.moveTo(0,y);ctx.lineTo(W,y);}ctx.stroke();
}
function drawGround(){
  const L=LEVELS[curLevel];const lava=L.hazard==='LAVA',agua=L.hazard==='água';
  const surf=506;
  // líquido animado (água / lava) preenchendo o fundo do vão
  if(lava||agua){
    const top=lava?'#ff7a32':'#3a8fe0',bot=lava?'#7a1a00':'#0c2c55';
    const g=ctx.createLinearGradient(0,surf,0,H);g.addColorStop(0,top);g.addColorStop(1,bot);
    ctx.save();ctx.globalAlpha=lava?0.5:0.42;ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=8){const y=surf+Math.sin(x*0.03+frame*0.05)*4+Math.sin(x*0.07-frame*0.03)*3;ctx.lineTo(x,y);}
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();ctx.restore();
    // crista da superfície
    ctx.strokeStyle=lava?'#ffd08a':'#bfe3ff';ctx.lineWidth=2;ctx.globalAlpha=0.8;ctx.beginPath();
    for(let x=0;x<=W;x+=8){const y=surf+Math.sin(x*0.03+frame*0.05)*4+Math.sin(x*0.07-frame*0.03)*3;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();ctx.globalAlpha=1;
    // bolhas (lava) / brilhos (água)
    for(let i=0;i<7;i++){const bx=((i*149+frame*(lava?1.1:0.6))%W);
      const by=surf+16+((i*53+frame*(lava?1.3:0.8))%(H-surf-20));
      ctx.fillStyle=lava?'rgba(255,210,120,0.5)':'rgba(200,235,255,0.4)';
      ctx.beginPath();ctx.arc(bx,by,lava?2.5:1.8,0,7);ctx.fill();}
  }else{ // penhasco: névoa de profundidade
    const g=ctx.createLinearGradient(0,surf,0,H);g.addColorStop(0,'rgba(255,255,255,0.05)');g.addColorStop(1,'rgba(0,0,0,0.25)');
    ctx.fillStyle=g;ctx.fillRect(0,surf,W,H-surf);
  }
  ctx.fillStyle='#cfe0ffcc';ctx.font='11px Segoe UI';ctx.fillText(L.hazard.toUpperCase(),12,H-10);
  // terreno: contorno branco estilo blueprint
  for(const gd of L.ground){
    const tg=ctx.createLinearGradient(0,gd.y,0,gd.y+gd.h);tg.addColorStop(0,'rgba(255,255,255,0.10)');tg.addColorStop(1,'rgba(255,255,255,0.03)');
    ctx.fillStyle=tg;ctx.fillRect(gd.x,gd.y,gd.w,gd.h);
    ctx.strokeStyle='#dfe9ff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(gd.x,gd.y);ctx.lineTo(gd.x+gd.w,gd.y);ctx.stroke();
    ctx.strokeStyle='#dfe9ff66';ctx.lineWidth=1.5;ctx.strokeRect(gd.x,gd.y,gd.w,gd.h);
    ctx.strokeStyle='#ffffff14';ctx.lineWidth=1;ctx.beginPath();
    for(let x=gd.x;x<gd.x+gd.w;x+=14){ctx.moveTo(x,gd.y);ctx.lineTo(x-22,gd.y+22);}ctx.stroke();
  }
  // bandeira de chegada (tremulando)
  let gy=560;for(const gd of L.ground)if(L.goalX>=gd.x&&L.goalX<=gd.x+gd.w)gy=gd.y;
  ctx.strokeStyle='#dfe9ff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(L.goalX,gy);ctx.lineTo(L.goalX,gy-58);ctx.stroke();
  ctx.fillStyle='#ffd23f';ctx.beginPath();ctx.moveTo(L.goalX,gy-58);
  const wv=Math.sin(frame*0.12)*4;
  ctx.quadraticCurveTo(L.goalX+16,gy-55+wv,L.goalX+32,gy-49);
  ctx.quadraticCurveTo(L.goalX+16,gy-45-wv,L.goalX,gy-40);ctx.closePath();ctx.fill();
}
function drawBeam(b){
  if(b.broken)return;const m=MAT[b.mat];
  const ax=b.a.x,ay=b.a.y,bx=b.b.x,by=b.b.y;
  ctx.lineCap='round';
  // brilho quando perto de romper
  const stress=running?Math.min(1,Math.abs(b.strain)/m.maxStrain):0;
  if(stress>0.65){ctx.save();ctx.shadowColor='#ff5a3a';ctx.shadowBlur=4+stress*12;}
  if(b.mat==='cable'){
    ctx.lineWidth=m.w;ctx.strokeStyle=running?strainColor(b):m.color;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
    if(stress>0.65)ctx.restore();return;
  }
  // viga 3D: contorno + topo claro
  ctx.lineWidth=m.w+2;ctx.strokeStyle=m.edge;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
  ctx.lineWidth=m.w;ctx.strokeStyle=running?strainColor(b):m.color;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
  if(!running){ctx.lineWidth=m.w*0.34;ctx.strokeStyle='rgba(255,255,255,0.28)';
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();}
  if(m.road){ctx.lineWidth=2;ctx.strokeStyle='#ffd23faa';ctx.setLineDash([9,9]);
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();ctx.setLineDash([]);}
  if(stress>0.65)ctx.restore();
}
function drawNode(p){
  if(p.pinned){ctx.fillStyle='#0e2244';ctx.beginPath();ctx.arc(p.x,p.y,6.5,0,7);ctx.fill();
    ctx.strokeStyle='#ffd23f';ctx.lineWidth=2.5;ctx.stroke();}
  else{ctx.fillStyle='#dfe9ff';ctx.beginPath();ctx.arc(p.x,p.y,3.4,0,7);ctx.fill();
    ctx.strokeStyle='#16335c';ctx.lineWidth=1.4;ctx.stroke();}
}
function drawCar(){
  if(!car)return;const C=CARS[curCar],lw=car.lw,rw=car.rw,R=car.R;
  const ang=Math.atan2(rw.y-lw.y,rw.x-lw.x),cx=(lw.x+rw.x)/2,cy=(lw.y+rw.y)/2,L=C.len;
  car._spin=(car._spin||0)+((lw.x-lw.px)+(rw.x-rw.px))/(2*R);
  // rodas (com raios girando)
  for(const w of[lw,rw]){ctx.fillStyle='#15171c';ctx.beginPath();ctx.arc(w.x,w.y,R,0,7);ctx.fill();
    ctx.fillStyle='#cfd6e0';ctx.beginPath();ctx.arc(w.x,w.y,R*0.45,0,7);ctx.fill();
    ctx.save();ctx.translate(w.x,w.y);ctx.rotate(car._spin);
    ctx.strokeStyle='#15171c';ctx.lineWidth=2;
    for(let k=0;k<4;k++){ctx.rotate(Math.PI/2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(R*0.42,0);ctx.stroke();}
    ctx.restore();
    ctx.fillStyle='#15171c';ctx.beginPath();ctx.arc(w.x,w.y,R*0.16,0,7);ctx.fill();}
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  ctx.strokeStyle='#0009';ctx.lineWidth=2;ctx.fillStyle=C.color;
  if(curCar==='bike'){rr(-L/2,-15,L,13,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#15171c';rr(-6,-26,12,12,3);ctx.fill();} // farol/cabeça
  else if(curCar==='car'){rr(-L/2,-13,L,13,5);ctx.fill();ctx.stroke();
    rr(-L/2+10,-24,L-22,13,5);ctx.fill();ctx.stroke();
    ctx.fillStyle='#bfe6ff';rr(-L/2+13,-22,L-28,9,3);ctx.fill();
    ctx.fillStyle='#ffe9a0';ctx.beginPath();ctx.arc(L/2-3,-5,3,0,7);ctx.fill();}
  else if(curCar==='truck'){rr(-L/2,-17,L*0.66,17,4);ctx.fill();ctx.stroke();
    rr(L/2-L*0.30,-28,L*0.30,28,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='#bfe6ff';rr(L/2-L*0.27,-25,L*0.18,10,2);ctx.fill();}
  else if(curCar==='bus'){rr(-L/2,-26,L,26,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#bfe6ff';for(let i=0;i<4;i++){rr(-L/2+7+i*(L-14)/4,-22,(L-22)/4-3,11,2);ctx.fill();}
    ctx.fillStyle='#ffe9a0';ctx.beginPath();ctx.arc(L/2-3,-6,3,0,7);ctx.fill();}
  else{rr(-L/2,-15,L,15,4);ctx.fill();ctx.stroke();
    rr(-L*0.30,-28,L*0.55,15,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=C.color;ctx.fillRect(L*0.16,-24,L*0.5,5);ctx.strokeRect(L*0.16,-24,L*0.5,5);} // canhão
  ctx.restore();
}
function draw(){
  drawBg();drawGround();
  // fantasma de encaixe + nó destacado ao passar o mouse (construção mais fácil)
  if(!running&&!erasing){
    const hov=findNode(mouse.x,mouse.y);
    if(hov){ctx.strokeStyle='#ffd23f';ctx.lineWidth=2;ctx.beginPath();ctx.arc(hov.x,hov.y,9,0,7);ctx.stroke();}
    else if(!drawing&&mouse.x>0&&mouse.x<W&&!onGround(mouse.x,mouse.y)){const s=snap(mouse.x,mouse.y);
      ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.arc(s.x,s.y,4,0,7);ctx.fill();}
  }
  for(const b of beams)drawBeam(b);
  for(const p of points){if(!p.car)drawNode(p);}
  if(drawing&&lastNode){const t=findNode(mouse.x,mouse.y)||snap(mouse.x,mouse.y);
    const len=Math.hypot(t.x-lastNode.x,t.y-lastNode.y);
    ctx.strokeStyle=len>MAX_BEAM?'#ff6b6b':'#ffffffbb';ctx.lineWidth=MAT[curMat].w;ctx.setLineDash([5,6]);
    ctx.beginPath();ctx.moveTo(lastNode.x,lastNode.y);ctx.lineTo(t.x,t.y);ctx.stroke();ctx.setLineDash([]);}
  drawCar();
  for(const s of sparks){ctx.globalAlpha=Math.max(0,s.life/40);ctx.fillStyle='#ffd166';ctx.fillRect(s.x,s.y,3,3);}ctx.globalAlpha=1;
}
function loop(){
  frame++;
  if(running&&!gameResult){physics();
    if(car){const spd=(Math.abs(car.lw.x-car.lw.px)+Math.abs(car.rw.x-car.rw.px))/2;engineUpdate(spd);}}
  draw();requestAnimationFrame(loop);
}

/* ===== UI ===== */
document.querySelectorAll('.lvl').forEach(b=>b.onclick=()=>{stopSim();loadLevel(+b.dataset.lvl);});
document.querySelectorAll('.mat').forEach(b=>b.onclick=()=>{curMat=b.dataset.mat;document.querySelectorAll('.mat').forEach(x=>x.classList.toggle('active',x===b));});
document.querySelectorAll('.car').forEach(b=>b.onclick=()=>{if(running)return;curCar=b.dataset.car;document.querySelectorAll('.car').forEach(x=>x.classList.toggle('active',x===b));});
document.getElementById('btnRun').onclick=()=>{running?stopSim():startSim();};
document.getElementById('btnUndo').onclick=()=>{if(running||!history.length)return;const h=history.pop();beams=beams.filter(x=>!h.beams.includes(x));h.pts.forEach(p=>points=points.filter(x=>x!==p));cleanOrphans();updateHUD();};
document.getElementById('btnClear').onclick=()=>{if(running)return;beams=[];points=points.filter(p=>p.pinned);history=[];updateHUD();};
document.getElementById('btnMute').onclick=()=>{muted=!muted;if(muted)engineStop();
  document.getElementById('btnMute').textContent=muted?'🔇':'🔊';};
window.addEventListener('keydown',e=>{
  if(e.key==='1')document.querySelector('[data-mat=road]').click();
  if(e.key==='2')document.querySelector('[data-mat=wood]').click();
  if(e.key==='3')document.querySelector('[data-mat=steel]').click();
  if(e.key==='4')document.querySelector('[data-mat=cable]').click();
  if(e.key===' '){e.preventDefault();document.getElementById('btnRun').click();}
  if(e.key==='z'||e.key==='Z')document.getElementById('btnUndo').click();
  if(e.key==='r'||e.key==='R'){if(document.getElementById('banner').classList.contains('show'))retrySim();
    else if(running){clearCar();startSim();}}
});
window.addEventListener('pointerdown',audioResume,{once:false});
document.querySelector('[data-mat=road]').classList.add('active');
loadLevel(0);loop();
</script>

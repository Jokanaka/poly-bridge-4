<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly Bridge 4 — Construtor de Pontes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { height:100%; }
  body {
    background:#0b1020; color:#e7ecf5; font-family: "Segoe UI", system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center; user-select:none;
    overflow:hidden;
  }
  #top {
    width:100%; max-width:1000px; padding:8px 10px 4px; display:flex; flex-direction:column; gap:6px;
  }
  .row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .title { font-weight:800; font-size:18px; letter-spacing:.5px; }
  .title span { color:#5cd6ff; }
  .pill {
    background:#1a2238; border:1px solid #2c3a5e; color:#cdd7ee; padding:5px 10px;
    border-radius:8px; cursor:pointer; font-size:12.5px; font-weight:600; transition:.12s;
  }
  .pill:hover { background:#243054; }
  .pill.active { background:#2f6df6; border-color:#5b8cff; color:#fff; }
  .pill.mat.active { box-shadow:0 0 0 2px #fff3 inset; }
  .swatch { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px; }
  .grow { flex:1; }
  .stat { font-size:12.5px; padding:5px 9px; background:#10172b; border:1px solid #233; border-radius:8px; }
  .stat b { color:#fff; }
  .ok { color:#5dff9b; } .bad { color:#ff6b6b; } .warn{color:#ffd36b;}
  #wrap { position:relative; }
  canvas { background:#000; border-radius:10px; border:1px solid #223; display:block; box-shadow:0 8px 40px #0008; }
  #hint {
    position:absolute; left:12px; top:12px; max-width:360px; background:#0a0f1eee; border:1px solid #2c3a5e;
    padding:9px 12px; border-radius:10px; font-size:12.5px; line-height:1.5; pointer-events:none;
  }
  #banner {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column;
    background:#04070feb; border-radius:10px; text-align:center; gap:10px;
  }
  #banner h1 { font-size:42px; }
  #banner.show { display:flex; }
  .btnbig { background:#2f6df6; border:none; color:#fff; padding:10px 20px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
  .btnbig:hover{ background:#4a82ff; }
  .small { font-size:11px; color:#8aa0c8; }
  kbd{ background:#222b46; border:1px solid #3a4a72; border-radius:5px; padding:1px 6px; font-size:11px; }
</style>
</head>
<body>
<div id="top">
  <div class="row">
    <div class="title">POLY BRIDGE <span>4</span></div>
    <div class="grow"></div>
    <div class="small">Níveis:</div>
    <button class="pill lvl" data-lvl="0">Tutorial</button>
    <button class="pill lvl" data-lvl="1">Fácil</button>
    <button class="pill lvl" data-lvl="2">Médio</button>
    <button class="pill lvl" data-lvl="3">Impossível 💀</button>
  </div>
  <div class="row">
    <div class="small">Material:</div>
    <button class="pill mat" data-mat="road"><span class="swatch" style="background:#3a3f4b"></span>Estrada</button>
    <button class="pill mat" data-mat="wood"><span class="swatch" style="background:#9a6b3f"></span>Madeira</button>
    <button class="pill mat" data-mat="steel"><span class="swatch" style="background:#8fb4d6"></span>Aço</button>
    <button class="pill mat" data-mat="cable"><span class="swatch" style="background:#ff9f43"></span>Cabo</button>
    <div class="grow"></div>
    <div class="small">Carro:</div>
    <button class="pill car" data-car="bike">🏍️ Leve</button>
    <button class="pill car" data-car="car">🚗 Carro</button>
    <button class="pill car" data-car="truck">🚚 Caminhão</button>
    <button class="pill car" data-car="tank">🚜 Tanque</button>
  </div>
  <div class="row">
    <button class="pill" id="btnRun">▶ Simular</button>
    <button class="pill" id="btnUndo">↶ Desfazer</button>
    <button class="pill" id="btnClear">🗑 Limpar</button>
    <div class="stat">Orçamento: <b id="budget">$0</b></div>
    <div class="stat">Custo atual: <b id="cost">$0</b></div>
    <div class="stat">🏆 Recorde (menor preço): <b id="best">—</b></div>
  </div>
</div>
<div id="wrap">
  <canvas id="cv" width="1000" height="560"></canvas>
  <div id="hint"></div>
  <div id="banner"><h1 id="bttl"></h1><div id="bsub" class="small"></div><button class="btnbig" id="bbtn">OK</button></div>
</div>

<script>
"use strict";
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// ---------- MATERIAIS (tensão/compressão reais) ----------
// cost: $ por unidade de comprimento(100px). maxStrain: deformação até romper.
// stiff: rigidez. road=dirigível. cableOnly=só puxa (afrouxa na compressão).
const MAT = {
  road:  { name:'Estrada', cost:10, maxStrain:0.06, stiff:1.0,  road:true,  cableOnly:false, color:'#3a3f4b' },
  wood:  { name:'Madeira', cost:6,  maxStrain:0.045,stiff:0.9,  road:false, cableOnly:false, color:'#9a6b3f' },
  steel: { name:'Aço',     cost:24, maxStrain:0.10, stiff:1.0,  road:false, cableOnly:false, color:'#8fb4d6' },
  cable: { name:'Cabo',    cost:5,  maxStrain:0.16, stiff:0.85, road:false, cableOnly:true,  color:'#ff9f43' },
};
const CARS = {
  bike:  { label:'Leve',     mass:0.7, wheelR:9,  body:'#39d98a', emoji:'🏍️' },
  car:   { label:'Carro',    mass:1.6, wheelR:10, body:'#4aa3ff', emoji:'🚗' },
  truck: { label:'Caminhão', mass:3.2, wheelR:12, body:'#ffb454', emoji:'🚚' },
  tank:  { label:'Tanque',   mass:6.5, wheelR:13, body:'#c06bff', emoji:'🚜' },
};

// ---------- NÍVEIS ----------
// ground: retângulos sólidos. anchors: pontos fixos (apoio). carStart/goal em px.
const LEVELS = [
  { name:'Tutorial', budget:600, theme:'day', car:'bike',
    ground:[ {x:0,y:380,w:330,h:180}, {x:670,y:380,w:330,h:180} ],
    anchors:[ {x:330,y:380}, {x:670,y:380} ],
    carStart:{x:120,y:360}, goalX:760,
    hint:'Conecte os dois apoios! Arraste de um nó a outro para criar uma viga. Use <b>Estrada</b> (dirigível) para o carro passar. Tecla <kbd>1-4</kbd> troca material. Aperte <b>▶ Simular</b>.' },

  { name:'Fácil', budget:1100, theme:'desert', car:'car',
    ground:[ {x:0,y:400,w:280,h:160}, {x:720,y:400,w:280,h:160} ],
    anchors:[ {x:280,y:400}, {x:720,y:400} ],
    carStart:{x:110,y:380}, goalX:800,
    hint:'Vão maior. A estrada sozinha entorta — use <b>Madeira</b> ou <b>Aço</b> embaixo como apoio. Cor da viga = tensão (verde→vermelho = perto de romper).' },

  { name:'Médio', budget:1700, theme:'night', car:'truck',
    ground:[ {x:0,y:410,w:230,h:150}, {x:480,y:300,w:90,h:260}, {x:770,y:410,w:230,h:150} ],
    anchors:[ {x:230,y:410}, {x:480,y:300}, {x:570,y:300}, {x:770,y:410} ],
    carStart:{x:95,y:390}, goalX:850,
    hint:'Pilar no meio + caminhão pesado. <b>Cabos</b> (laranja) só puxam: ótimos pendurados de cima. Triângulos = força. Faça uma treliça!' },

  { name:'Impossível', budget:2200, theme:'lava', car:'tank',
    ground:[ {x:0,y:430,w:180,h:130}, {x:820,y:430,w:180,h:130} ],
    anchors:[ {x:180,y:430}, {x:180,y:300}, {x:820,y:300}, {x:820,y:430} ],
    carStart:{x:80,y:410}, goalX:890,
    hint:'Vão gigante sobre a lava, tanque de 6.5t e orçamento curto. Tem apoios altos nas laterais — use cabos de cima + treliça de aço. Boa sorte. 💀' },
];

// ---------- ESTADO ----------
let curLevel = 0, curMat = 'road', curCar = 'car';
let points = [];   // {x,y,px,py,pinned,invMass}
let beams  = [];   // {a,b,rest,mat,broken,strain}
let history = [];  // para desfazer
let running = false, simTime = 0;
let car = null, result = null; // 'win'|'lose'
const SNAP = 18, MAX_BEAM = 150, GRAV = 0.42, DAMP = 0.992, SUB = 6, ITER = 9;
const best = JSON.parse(localStorage.getItem('pb4_best')||'{}');

// ---------- HELPERS ----------
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function addPoint(x,y,pinned){ const p={x,y,px:x,py:y,pinned:!!pinned,invMass:pinned?0:1}; points.push(p); return p; }
function findNode(x,y){
  let best=null, bd=SNAP;
  for(const p of points){ const d=Math.hypot(p.x-x,p.y-y); if(d<bd){bd=d; best=p;} }
  return best;
}
function totalCost(){
  let c=0; for(const b of beams){ c += dist(b.a,b.b)/100 * MAT[b.mat].cost; }
  return Math.round(c);
}

// ---------- CARREGAR NÍVEL ----------
function loadLevel(i){
  curLevel=i; running=false; result=null; car=null; simTime=0;
  points=[]; beams=[]; history=[];
  const L=LEVELS[i];
  // ancoras fixas
  L._anchors = L.anchors.map(a=>addPoint(a.x,a.y,true));
  curCar = L.car;
  document.querySelectorAll('.car').forEach(b=>b.classList.toggle('active',b.dataset.car===curCar));
  document.querySelectorAll('.lvl').forEach(b=>b.classList.toggle('active',+b.dataset.lvl===i));
  document.getElementById('budget').textContent='$'+L.budget;
  document.getElementById('hint').innerHTML = L.hint;
  document.getElementById('hint').style.display='block';
  updateHUD();
}
function updateHUD(){
  const c=totalCost(); const L=LEVELS[curLevel];
  const el=document.getElementById('cost'); el.textContent='$'+c;
  el.className = c>L.budget ? 'bad' : '';
  const b=best[curLevel];
  document.getElementById('best').textContent = b!=null ? '$'+b : '—';
}

// ---------- CONSTRUIR (mouse) ----------
let dragFrom=null, mouse={x:0,y:0};
function evtPos(e){
  const r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) };
}
cv.addEventListener('mousedown', e=>{
  if(running) return;
  if(e.button===2) return; // direito = apagar (no contextmenu)
  const m=evtPos(e); mouse=m;
  let n=findNode(m.x,m.y);
  if(!n){ if(onGround(m.x,m.y)) return; n=addPoint(m.x,m.y,false); dragFrom={node:n,created:true}; }
  else dragFrom={node:n,created:false};
});
cv.addEventListener('mousemove', e=>{ mouse=evtPos(e); });
cv.addEventListener('mouseup', e=>{
  if(running||!dragFrom){ dragFrom=null; return; }
  const m=evtPos(e);
  let to=findNode(m.x,m.y);
  const undoPts=[]; if(dragFrom.created) undoPts.push(dragFrom.node);
  if(!to){
    if(onGround(m.x,m.y) || dist(dragFrom.node,m)<10){ cleanupOrphan(dragFrom); dragFrom=null; return; }
    to=addPoint(m.x,m.y,false); undoPts.push(to);
  }
  if(to===dragFrom.node || dist(dragFrom.node,to)>MAX_BEAM || dist(dragFrom.node,to)<8){ cleanupOrphan(dragFrom); dragFrom=null; return; }
  // sem duplicar
  if(beams.some(b=>(b.a===dragFrom.node&&b.b===to)||(b.a===to&&b.b===dragFrom.node))){ cleanupOrphan(dragFrom); dragFrom=null; return; }
  const bm={a:dragFrom.node,b:to,rest:dist(dragFrom.node,to),mat:curMat,broken:false,strain:0};
  beams.push(bm);
  history.push({beam:bm, pts:undoPts});
  dragFrom=null; updateHUD();
});
cv.addEventListener('contextmenu', e=>{
  e.preventDefault(); if(running) return;
  const m=evtPos(e);
  // apagar viga mais próxima do clique
  let bi=-1, bd=10;
  beams.forEach((b,i)=>{ const d=ptSeg(m,b.a,b.b); if(d<bd){bd=d; bi=i;} });
  if(bi>=0){ beams.splice(bi,1); cleanOrphans(); updateHUD(); }
});
function cleanupOrphan(df){ if(df.created && !beams.some(b=>b.a===df.node||b.b===df.node)) points=points.filter(p=>p!==df.node); }
function cleanOrphans(){ points=points.filter(p=>p.pinned||beams.some(b=>b.a===p||b.b===p)); }
function onGround(x,y){ return LEVELS[curLevel].ground.some(g=>x>=g.x&&x<=g.x+g.w&&y>=g.y&&y<=g.y+g.h); }
function ptSeg(p,a,b){
  const dx=b.x-a.x, dy=b.y-a.y, l2=dx*dx+dy*dy;
  let t = l2? ((p.x-a.x)*dx+(p.y-a.y)*dy)/l2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-(a.x+t*dx), p.y-(a.y+t*dy));
}

// ---------- SIMULAÇÃO (Verlet) ----------
function startSim(){
  const L=LEVELS[curLevel];
  if(totalCost()>L.budget){ flash('Acima do orçamento!','Reduza o custo abaixo de $'+L.budget); return; }
  if(beams.length===0){ flash('Construa algo!','Conecte os apoios primeiro.'); return; }
  running=true; result=null; simTime=0;
  document.getElementById('btnRun').textContent='⏹ Parar';
  document.getElementById('hint').style.display='none';
  // criar carro
  const C=CARS[curCar], s=L.carStart;
  const lw=addPoint(s.x-17,s.y,false), rw=addPoint(s.x+17,s.y,false), bd=addPoint(s.x,s.y-24,false);
  const im = 1/(C.mass);
  lw.invMass=im; rw.invMass=im; bd.invMass=im*0.8; lw.car=rw.car=bd.car=true;
  const stiffBeam=(a,b)=>({a,b,rest:dist(a,b),mat:'steel',broken:false,strain:0,carBeam:true});
  car={ lw,rw,bd, R:C.wheelR,
        beams:[stiffBeam(lw,rw),stiffBeam(lw,bd),stiffBeam(rw,bd)], grounded:false };
}
function stopSim(){
  running=false; result=null; document.getElementById('btnRun').textContent='▶ Simular';
  // remover pontos/vigas do carro e restaurar deformações
  if(car){ points=points.filter(p=>!p.car); car=null; }
  for(const b of beams){ b.broken=false; b.strain=0; }
  // resetar posições dos nós livres (re-snap às originais é complexo; mantém geometria atual)
  document.getElementById('hint').style.display='block';
  updateHUD();
}
function physics(){
  const subG = GRAV/SUB;
  for(let s=0;s<SUB;s++){
    // integração
    for(const p of points){
      if(p.invMass===0) continue;
      const vx=(p.x-p.px)*DAMP, vy=(p.y-p.py)*DAMP;
      p.px=p.x; p.py=p.y; p.x+=vx; p.y+=vy+subG;
    }
    // tração do carro
    if(car){
      const target=2.6;
      for(const w of [car.lw,car.rw]){
        if(w._grounded){ let vx=(w.x-w.px); vx+= (target-vx)*0.08; w.px=w.x-vx; }
      }
      car.lw._grounded=car.rw._grounded=false;
    }
    // relaxação de restrições
    for(let it=0; it<ITER; it++){
      solveBeams(beams,true);
      if(car) solveBeams(car.beams,false);
      collide();
    }
  }
  // quebra (só durante simulação, depois de assentar)
  if(simTime>14){
    for(const b of beams){
      if(b.broken) continue;
      const m=MAT[b.mat];
      let st=b.strain; if(m.cableOnly && st<0) st=0;
      if(Math.abs(st)>m.maxStrain) b.broken=true;
    }
  }
  // checar resultado
  if(car){
    const cx=car.bd.x, cy=car.bd.y;
    if(cy>H+80){ result='lose'; }
    else if(cx>LEVELS[curLevel].goalX){ result='win'; }
    if(result) finishSim();
  }
  simTime++;
}
function solveBeams(list, track){
  for(const b of list){
    if(b.broken) continue;
    const a=b.a, c=b.b;
    let dx=c.x-a.x, dy=c.y-a.y, d=Math.hypot(dx,dy); if(d===0) continue;
    const strain=(d-b.rest)/b.rest;
    if(track) b.strain=strain;
    const m = b.carBeam ? {stiff:1,cableOnly:false} : MAT[b.mat];
    if(m.cableOnly && strain<0) continue; // cabo afrouxa
    const wsum=(a.invMass+c.invMass); if(wsum===0) continue;
    const diff=((d-b.rest)/d)*m.stiff;
    const ka=a.invMass/wsum, kc=c.invMass/wsum;
    a.x+=dx*diff*ka; a.y+=dy*diff*ka;
    c.x-=dx*diff*kc; c.y-=dy*diff*kc;
  }
}
function collide(){
  if(!car) return;
  const L=LEVELS[curLevel];
  for(const w of [car.lw,car.rw]){
    // chão
    for(const g of L.ground){
      if(w.x>g.x-2 && w.x<g.x+g.w+2 && w.y+car.R>g.y && w.y<g.y+30){
        if(w.y < g.y){ w.y=g.y-car.R; w._grounded=true; }
      }
    }
    // rodas vs estrada (vigas dirigíveis)
    for(const b of beams){
      if(b.broken || !MAT[b.mat].road) continue;
      const a=b.a, c=b.b, dx=c.x-a.x, dy=c.y-a.y, l2=dx*dx+dy*dy; if(!l2) continue;
      let t=((w.x-a.x)*dx+(w.y-a.y)*dy)/l2; t=Math.max(0,Math.min(1,t));
      const qx=a.x+t*dx, qy=a.y+t*dy;
      let nx=w.x-qx, ny=w.y-qy, dd=Math.hypot(nx,ny);
      if(dd<car.R && dd>0.001){
        nx/=dd; ny/=dd; const pen=car.R-dd;
        // empurra a roda pra fora e carrega a viga (3ª lei)
        const wm=w.invMass, sm=(a.invMass+c.invMass)*0.5+0.0001, tot=wm+sm;
        w.x+=nx*pen*(wm/tot); w.y+=ny*pen*(wm/tot);
        const push=pen*(sm/tot);
        a.x-=nx*push*(1-t); a.y-=ny*push*(1-t);
        c.x-=nx*push*t;     c.y-=ny*push*t;
        if(ny<-0.3) w._grounded=true;
      }
    }
  }
}
function finishSim(){
  const L=LEVELS[curLevel];
  if(result==='win'){
    const c=totalCost();
    if(best[curLevel]==null || c<best[curLevel]){ best[curLevel]=c; localStorage.setItem('pb4_best',JSON.stringify(best)); }
    flash('🎉 ATRAVESSOU!','Custo: $'+c+'  •  Recorde do nível: $'+best[curLevel]+(c<=best[curLevel]?'  (novo!)':''));
  } else {
    flash('💥 CAIU!','A ponte não aguentou. Reforce os pontos vermelhos e tente de novo.');
  }
  running=false; document.getElementById('btnRun').textContent='▶ Simular';
}

// ---------- BANNER ----------
function flash(t,s){
  document.getElementById('bttl').textContent=t;
  document.getElementById('bsub').textContent=s;
  document.getElementById('banner').classList.add('show');
}
document.getElementById('bbtn').onclick=()=>{
  document.getElementById('banner').classList.remove('show');
  if(car){ points=points.filter(p=>!p.car); for(const b of beams){b.broken=false;b.strain=0;} car=null; document.getElementById('hint').style.display='block'; updateHUD(); }
};

// ---------- DESENHO ----------
function strainColor(b){
  const m=MAT[b.mat]; let s=Math.abs(b.strain)/m.maxStrain; s=Math.max(0,Math.min(1,s));
  // verde -> amarelo -> vermelho
  const r=Math.round(60+195*Math.min(1,s*2));
  const g=Math.round(220-200*Math.max(0,s));
  return `rgb(${r},${g},70)`;
}
function drawBg(){
  const L=LEVELS[curLevel];
  const g=ctx.createLinearGradient(0,0,0,H);
  if(L.theme==='day'){ g.addColorStop(0,'#7ec8ff'); g.addColorStop(1,'#cdeeff'); }
  else if(L.theme==='desert'){ g.addColorStop(0,'#ffb56b'); g.addColorStop(1,'#ffe0a3'); }
  else if(L.theme==='night'){ g.addColorStop(0,'#0a1330'); g.addColorStop(1,'#1b2a55'); }
  else { g.addColorStop(0,'#2b0a0a'); g.addColorStop(1,'#5a1410'); }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // decoração de fundo
  if(L.theme==='day'){ ctx.fillStyle='#ffffffcc'; cloud(160,90,40); cloud(620,70,55); cloud(820,140,35); }
  if(L.theme==='night'){ ctx.fillStyle='#fff'; for(let i=0;i<60;i++){ const x=(i*167%W), y=(i*97%260); ctx.globalAlpha=(i%5)/6+0.2; ctx.fillRect(x,y,2,2);} ctx.globalAlpha=1;
    ctx.fillStyle='#11204a'; for(let i=0;i<8;i++){ ctx.fillRect(40+i*120, 250-(i%3)*40, 70, 200);} }
  if(L.theme==='desert'){ ctx.fillStyle='#e09a4f'; ctx.beginPath(); ctx.moveTo(0,300); ctx.bezierCurveTo(250,250,500,330,1000,280); ctx.lineTo(1000,560); ctx.lineTo(0,560); ctx.fill(); }
  if(L.theme==='lava'){ ctx.fillStyle='#ff5a2c'; ctx.fillRect(0,500,W,60);
    ctx.fillStyle='#ffb14a'; for(let i=0;i<W;i+=40){ const h=8+((i*7)%14); ctx.fillRect(i,500-h,22,h);} }
}
function cloud(x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.arc(x+r,y+6,r*0.8,0,7); ctx.arc(x-r,y+8,r*0.7,0,7); ctx.fill(); }
function draw(){
  drawBg();
  const L=LEVELS[curLevel];
  // chão
  for(const gnd of L.ground){
    ctx.fillStyle = L.theme==='night' ? '#10204a' : (L.theme==='lava'?'#3a1410':'#5a4632');
    ctx.fillRect(gnd.x,gnd.y,gnd.w,gnd.h);
    ctx.fillStyle = L.theme==='night' ? '#1c3570' : (L.theme==='lava'?'#522018':'#3f7d3a');
    ctx.fillRect(gnd.x,gnd.y,gnd.w,8);
  }
  // bandeira de chegada
  ctx.save(); ctx.translate(L.goalX,0);
  let gy=560; for(const gnd of L.ground){ if(L.goalX>=gnd.x&&L.goalX<=gnd.x+gnd.w){ gy=gnd.y; } }
  ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(0,gy-50); ctx.stroke();
  ctx.fillStyle='#2f6df6'; ctx.beginPath(); ctx.moveTo(0,gy-50); ctx.lineTo(30,gy-42); ctx.lineTo(0,gy-34); ctx.fill();
  ctx.restore();
  // vigas
  for(const b of beams){
    if(b.broken){ continue; }
    const m=MAT[b.mat];
    ctx.lineWidth = m.road?7 : (b.mat==='cable'?2.5:5);
    ctx.strokeStyle = running ? strainColor(b) : m.color;
    if(b.mat==='cable' && !running){ ctx.strokeStyle=m.color; }
    ctx.beginPath(); ctx.moveTo(b.a.x,b.a.y); ctx.lineTo(b.b.x,b.b.y); ctx.stroke();
    if(m.road){ ctx.strokeStyle='#0006'; ctx.lineWidth=1.5; ctx.setLineDash([6,6]); ctx.beginPath(); ctx.moveTo(b.a.x,b.a.y); ctx.lineTo(b.b.x,b.b.y); ctx.stroke(); ctx.setLineDash([]); }
  }
  // vigas quebradas (faísca)
  // nós
  for(const p of points){
    if(p.car) continue;
    ctx.fillStyle = p.pinned ? '#ffd36b' : '#dfe8ff';
    ctx.beginPath(); ctx.arc(p.x,p.y, p.pinned?6:4, 0,7); ctx.fill();
    if(p.pinned){ ctx.strokeStyle='#a87b18'; ctx.lineWidth=2; ctx.stroke(); }
  }
  // preview de arraste
  if(dragFrom){
    const to=findNode(mouse.x,mouse.y)||mouse;
    const len=dist(dragFrom.node,to);
    ctx.strokeStyle = (len>MAX_BEAM)?'#ff6b6b':'#ffffff99'; ctx.lineWidth=4; ctx.setLineDash([4,5]);
    ctx.beginPath(); ctx.moveTo(dragFrom.node.x,dragFrom.node.y); ctx.lineTo(to.x,to.y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#000a'; ctx.fillRect(to.x+8,to.y-22,90,18);
    ctx.fillStyle='#fff'; ctx.font='12px sans-serif';
    ctx.fillText('$'+(len/100*MAT[curMat].cost).toFixed(0)+' • '+Math.round(len)+'px', to.x+12, to.y-9);
  }
  // carro
  if(car){
    ctx.fillStyle=CARS[curCar].body;
    ctx.beginPath(); ctx.moveTo(car.lw.x,car.lw.y); ctx.lineTo(car.bd.x,car.bd.y); ctx.lineTo(car.rw.x,car.rw.y); ctx.closePath(); ctx.fill();
    for(const w of [car.lw,car.rw]){
      ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(w.x,w.y,car.R,0,7); ctx.fill();
      ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(w.x,w.y,car.R*0.45,0,7); ctx.fill();
    }
    ctx.font='18px sans-serif'; ctx.fillText(CARS[curCar].emoji, car.bd.x-9, car.bd.y-6);
  }
}

// ---------- LOOP ----------
function loop(){
  if(running && !result) physics();
  draw();
  requestAnimationFrame(loop);
}

// ---------- UI BIND ----------
document.querySelectorAll('.lvl').forEach(b=> b.onclick=()=>{ stopSim(); loadLevel(+b.dataset.lvl); });
document.querySelectorAll('.mat').forEach(b=> b.onclick=()=>{ curMat=b.dataset.mat; document.querySelectorAll('.mat').forEach(x=>x.classList.toggle('active',x===b)); });
document.querySelectorAll('.car').forEach(b=> b.onclick=()=>{ if(running) return; curCar=b.dataset.car; document.querySelectorAll('.car').forEach(x=>x.classList.toggle('active',x===b)); });
document.getElementById('btnRun').onclick=()=>{ running?stopSim():startSim(); };
document.getElementById('btnUndo').onclick=()=>{ if(running||!history.length) return; const h=history.pop(); beams=beams.filter(x=>x!==h.beam); for(const p of h.pts) points=points.filter(x=>x!==p); cleanOrphans(); updateHUD(); };
document.getElementById('btnClear').onclick=()=>{ if(running) return; beams=[]; points=points.filter(p=>p.pinned); history=[]; updateHUD(); };
window.addEventListener('keydown', e=>{
  if(e.key==='1') document.querySelector('[data-mat=road]').click();
  if(e.key==='2') document.querySelector('[data-mat=wood]').click();
  if(e.key==='3') document.querySelector('[data-mat=steel]').click();
  if(e.key==='4') document.querySelector('[data-mat=cable]').click();
  if(e.key===' '){ e.preventDefault(); document.getElementById('btnRun').click(); }
  if(e.key==='z'||e.key==='Z') document.getElementById('btnUndo').click();
});

// init
document.querySelector('[data-mat=road]').classList.add('active');
loadLevel(0);
loop();
</script>

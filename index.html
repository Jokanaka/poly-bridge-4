<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly Bridge 4</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#070b16;color:#e7ecf5;font-family:"Segoe UI",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;user-select:none;overflow:hidden}
  #top{width:100%;max-width:1000px;padding:8px 10px 4px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .title{font-weight:800;font-size:18px;letter-spacing:.5px}
  .title span{color:#5cd6ff}
  .pill{background:#161d33;border:1px solid #2a3760;color:#cdd7ee;padding:5px 10px;border-radius:9px;
    cursor:pointer;font-size:12.5px;font-weight:600;transition:.12s;display:inline-flex;align-items:center;gap:5px}
  .pill:hover{background:#222d4d}
  .pill.active{background:#2f6df6;border-color:#6f9bff;color:#fff;box-shadow:0 2px 10px #2f6df655}
  .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .grow{flex:1}
  .stat{font-size:12.5px;padding:5px 9px;background:#0d1326;border:1px solid #233357;border-radius:9px}
  .stat b{color:#fff}
  .bad{color:#ff6b6b!important}
  #wrap{position:relative}
  canvas{background:#000;border-radius:12px;border:1px solid #1c2950;display:block;box-shadow:0 12px 50px #000a;cursor:crosshair}
  #hint{position:absolute;left:12px;top:12px;max-width:380px;background:#070d1ee8;border:1px solid #2a3760;
    padding:10px 13px;border-radius:11px;font-size:12.5px;line-height:1.55;pointer-events:none}
  #banner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
    background:#03060deb;border-radius:12px;text-align:center;gap:12px}
  #banner.show{display:flex}
  #banner h1{font-size:46px}
  .btnbig{background:#2f6df6;border:none;color:#fff;padding:11px 24px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
  .btnbig:hover{background:#4a82ff}
  .small{font-size:11px;color:#8aa0c8}
  kbd{background:#1e294a;border:1px solid #3a4a72;border-radius:5px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
<div id="top">
  <div class="row">
    <div class="title">POLY BRIDGE <span>4</span></div>
    <div class="grow"></div>
    <button class="pill lvl" data-lvl="0">🟢 Tutorial</button>
    <button class="pill lvl" data-lvl="1">🔵 Fácil</button>
    <button class="pill lvl" data-lvl="2">🟠 Médio</button>
    <button class="pill lvl" data-lvl="3">💀 Impossível</button>
  </div>
  <div class="row">
    <span class="small">Material:</span>
    <button class="pill mat" data-mat="road"><span class="sw" style="background:#42485a"></span>Estrada <kbd>1</kbd></button>
    <button class="pill mat" data-mat="wood"><span class="sw" style="background:#b07b46"></span>Madeira <kbd>2</kbd></button>
    <button class="pill mat" data-mat="steel"><span class="sw" style="background:#9ec3e6"></span>Aço <kbd>3</kbd></button>
    <button class="pill mat" data-mat="cable"><span class="sw" style="background:#ff9f43"></span>Cabo <kbd>4</kbd></button>
    <div class="grow"></div>
    <span class="small">Veículo:</span>
    <button class="pill car" data-car="bike">🏍️</button>
    <button class="pill car" data-car="car">🚗</button>
    <button class="pill car" data-car="truck">🚚</button>
    <button class="pill car" data-car="tank">🚜</button>
  </div>
  <div class="row">
    <button class="pill" id="btnRun">▶ Simular <kbd>espaço</kbd></button>
    <button class="pill" id="btnUndo">↶ Desfazer <kbd>Z</kbd></button>
    <button class="pill" id="btnClear">🗑 Limpar</button>
    <div class="stat">Orçamento <b id="budget">$0</b></div>
    <div class="stat">Custo <b id="cost">$0</b></div>
    <div class="stat">🏆 Recorde <b id="best">—</b></div>
  </div>
</div>
<div id="wrap">
  <canvas id="cv" width="1000" height="560"></canvas>
  <div id="hint"></div>
  <div id="banner"><h1 id="bttl"></h1><div id="bsub" class="small"></div><button class="btnbig" id="bbtn">OK</button></div>
</div>

<script>
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;

/* ===== MATERIAIS (tensão/compressão reais) ===== */
const MAT={
  road : {name:'Estrada',cost:12,maxStrain:0.060,stiff:0.90,road:true ,cableOnly:false,color:'#42485a',w:8},
  wood : {name:'Madeira',cost:7 ,maxStrain:0.050,stiff:0.80,road:false,cableOnly:false,color:'#b07b46',w:6},
  steel: {name:'Aço'    ,cost:26,maxStrain:0.110,stiff:1.00,road:false,cableOnly:false,color:'#9ec3e6',w:5},
  cable: {name:'Cabo'   ,cost:6 ,maxStrain:0.150,stiff:1.00,road:false,cableOnly:true ,color:'#ff9f43',w:2.6},
};
/* ===== VEÍCULOS (peso diferente) ===== */
const CARS={
  bike :{label:'Moto'    ,mass:0.6,wheelR:8 ,len:30,color:'#39d98a',emoji:'🏍️'},
  car  :{label:'Carro'   ,mass:1.5,wheelR:10,len:40,color:'#4aa3ff',emoji:'🚗'},
  truck:{label:'Caminhão',mass:3.2,wheelR:12,len:54,color:'#ffb454',emoji:'🚚'},
  tank :{label:'Tanque'  ,mass:7.0,wheelR:14,len:60,color:'#c06bff',emoji:'🚜'},
};

/* ===== NÍVEIS ===== */
const LEVELS=[
 {name:'Tutorial',budget:700,theme:'day',car:'bike',
  ground:[{x:0,y:392,w:336,h:170},{x:664,y:392,w:336,h:170}],
  anchors:[[336,392],[664,392]],
  carStart:[120,372],goalX:760,
  hint:'Ligue os 2 apoios amarelos. <b>Arraste</b> de um ponto a outro para desenhar — segure e arraste para fazer vigas em cadeia. Use <b>Estrada</b> (1) onde o carro passa. <b>▶ Simular</b> quando pronto.'},

 {name:'Fácil',budget:1300,theme:'day',car:'car',
  ground:[{x:0,y:404,w:288,h:158},{x:712,y:404,w:288,h:158}],
  anchors:[[288,404],[712,404]],
  carStart:[110,384],goalX:800,
  hint:'Vão maior. Só estrada vai afundar e romper (fica vermelha). Reforce embaixo com <b>Madeira/Aço</b> formando <b>triângulos</b> — triângulo não dobra.'},

 {name:'Médio',budget:2000,theme:'night',car:'truck',
  ground:[{x:0,y:412,w:236,h:150},{x:470,y:300,w:90,h:262},{x:764,y:412,w:236,h:150}],
  anchors:[[236,412],[470,300],[560,300],[764,412]],
  carStart:[100,392],goalX:850,
  hint:'Pilar no meio + caminhão pesado. <b>Cabos</b> (4) só puxam — pendure-os de cima como ponte estaiada. Faça uma treliça de aço.'},

 {name:'Impossível',budget:2600,theme:'lava',car:'tank',
  ground:[{x:0,y:436,w:188,h:126},{x:812,y:436,w:188,h:126}],
  anchors:[[188,436],[188,288],[812,288],[812,436]],
  carStart:[80,416],goalX:892,
  hint:'Vão enorme sobre a lava, <b>tanque de 7t</b>, orçamento curto. Há torres altas nas pontas: combine <b>cabos do alto</b> + <b>treliça de aço</b>. Estrada pura não tem chance. 💀'},
];

/* ===== ESTADO ===== */
let curLevel=0,curMat='road',curCar='car';
let points=[],beams=[],history=[];
let running=false,simTime=0,gameResult=null,car=null;
let sparks=[];
const GRID=28, SNAP=20, MAX_BEAM=156, GRAV=0.5, DAMP=0.99, SUB=6, ITER=8;
const best=JSON.parse(localStorage.getItem('pb4_best')||'{}');

/* ===== HELPERS ===== */
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function addPoint(x,y,pinned){const p={x,y,px:x,py:y,pinned:!!pinned,invMass:pinned?0:1};points.push(p);return p;}
function findNode(x,y,r){r=r||SNAP;let b=null,bd=r;for(const p of points){const d=Math.hypot(p.x-x,p.y-y);if(d<bd){bd=d;b=p;}}return b;}
function snap(x,y){return {x:Math.round(x/GRID)*GRID, y:Math.round(y/GRID)*GRID};}
function onGround(x,y){return LEVELS[curLevel].ground.some(g=>x>=g.x-3&&x<=g.x+g.w+3&&y>=g.y-2&&y<=g.y+g.h);}
function totalCost(){let c=0;for(const b of beams)c+=dist(b.a,b.b)/100*MAT[b.mat].cost;return Math.round(c);}
function ptSeg(p,a,b){const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;let t=l2?((p.x-a.x)*dx+(p.y-a.y)*dy)/l2:0;t=Math.max(0,Math.min(1,t));return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));}

/* ===== NÍVEL ===== */
function loadLevel(i){
  curLevel=i;running=false;gameResult=null;car=null;simTime=0;sparks=[];
  points=[];beams=[];history=[];
  const L=LEVELS[i];
  L.anchors.forEach(a=>addPoint(a[0],a[1],true));
  curCar=L.car;
  document.querySelectorAll('.car').forEach(b=>b.classList.toggle('active',b.dataset.car===curCar));
  document.querySelectorAll('.lvl').forEach(b=>b.classList.toggle('active',+b.dataset.lvl===i));
  document.getElementById('budget').textContent='$'+L.budget;
  const h=document.getElementById('hint');h.innerHTML=L.hint;h.style.display='block';
  updateHUD();
}
function updateHUD(){
  const c=totalCost(),L=LEVELS[curLevel];
  const e=document.getElementById('cost');e.textContent='$'+c;e.parentElement.classList.toggle('bad',c>L.budget);
  document.getElementById('best').textContent=best[curLevel]!=null?'$'+best[curLevel]:'—';
}

/* ===== CONSTRUÇÃO (grid + arrasto em cadeia) ===== */
let mouse={x:0,y:0},drawing=false,lastNode=null,stroke=null;
function evt(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
function getOrCreate(x,y){
  const n=findNode(x,y);if(n)return n;
  const s=snap(x,y);const e=findNode(s.x,s.y,GRID*0.5);if(e)return e;
  const p=addPoint(s.x,s.y,false);if(stroke)stroke.pts.push(p);return p;
}
function tryBeam(a,b){
  if(!a||!b||a===b)return;
  const d=dist(a,b);if(d<10||d>MAX_BEAM)return;
  if(beams.some(x=>(x.a===a&&x.b===b)||(x.a===b&&x.b===a)))return;
  const bm={a,b,rest:d,mat:curMat,broken:false,strain:0};
  beams.push(bm);if(stroke)stroke.beams.push(bm);
  updateHUD();
}
cv.addEventListener('mousedown',e=>{
  if(running||e.button===2)return;
  const m=evt(e);mouse=m;
  stroke={beams:[],pts:[]};
  const start=findNode(m.x,m.y) || (onGround(m.x,m.y)?null:getOrCreate(m.x,m.y));
  if(!start){stroke=null;return;}
  drawing=true;lastNode=start;
});
cv.addEventListener('mousemove',e=>{
  mouse=evt(e);
  if(!drawing)return;
  let tgt=findNode(mouse.x,mouse.y);
  if(!tgt){
    if(onGround(mouse.x,mouse.y))return;
    const s=snap(mouse.x,mouse.y);
    if(Math.hypot(s.x-lastNode.x,s.y-lastNode.y)<GRID*0.8)return; // ainda na mesma célula
    if(Math.hypot(s.x-lastNode.x,s.y-lastNode.y)>MAX_BEAM)return; // longe demais, espera
    tgt=getOrCreate(s.x,s.y);
  }
  if(tgt&&tgt!==lastNode){tryBeam(lastNode,tgt);lastNode=tgt;}
});
window.addEventListener('mouseup',()=>{
  if(!drawing){stroke=null;return;}
  drawing=false;
  if(stroke&&stroke.beams.length)history.push(stroke);
  else if(stroke){stroke.pts.forEach(p=>{if(!beams.some(b=>b.a===p||b.b===p))points=points.filter(x=>x!==p);});}
  stroke=null;lastNode=null;
});
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();if(running)return;
  const m=evt(e);let bi=-1,bd=11;
  beams.forEach((b,i)=>{const d=ptSeg(m,b.a,b.b);if(d<bd){bd=d;bi=i;}});
  if(bi>=0){beams.splice(bi,1);cleanOrphans();updateHUD();}
});
function cleanOrphans(){points=points.filter(p=>p.pinned||beams.some(b=>b.a===p||b.b===p));}

/* ===== SIMULAÇÃO ===== */
function startSim(){
  const L=LEVELS[curLevel];
  if(beams.length===0){flash('Construa algo!','Conecte os apoios amarelos primeiro.');return;}
  if(totalCost()>L.budget){flash('Acima do orçamento!','Deixe o custo abaixo de $'+L.budget+'.');return;}
  running=true;gameResult=null;simTime=0;sparks=[];
  document.getElementById('btnRun').textContent='⏹ Parar';
  document.getElementById('hint').style.display='none';
  const C=CARS[curCar],s=L.carStart,h=C.len/2;
  const lw=addPoint(s[0]-h,s[1],false),rw=addPoint(s[0]+h,s[1],false),bd=addPoint(s[0],s[1]-22,false);
  const im=1/C.mass;lw.invMass=rw.invMass=im;bd.invMass=im*1.2;lw.car=rw.car=bd.car=true;
  const sb=(a,b)=>({a,b,rest:dist(a,b),mat:'steel',broken:false,strain:0,carBeam:true});
  car={lw,rw,bd,R:C.wheelR,beams:[sb(lw,rw),sb(lw,bd),sb(rw,bd)]};
}
function stopSim(){
  running=false;gameResult=null;document.getElementById('btnRun').textContent='▶ Simular';
  if(car){points=points.filter(p=>!p.car);car=null;}
  for(const b of beams){b.broken=false;b.strain=0;}
  document.getElementById('hint').style.display='block';updateHUD();
}
function physics(){
  const sg=GRAV/SUB;
  for(let s=0;s<SUB;s++){
    for(const p of points){if(p.invMass===0)continue;
      const vx=(p.x-p.px)*DAMP,vy=(p.y-p.py)*DAMP;p.px=p.x;p.py=p.y;p.x+=vx;p.y+=vy+sg;}
    if(car){const t=3.4;for(const w of[car.lw,car.rw]){if(w._g){let vx=w.x-w.px;vx+=(t-vx)*0.14;w.px=w.x-vx;}}car.lw._g=car.rw._g=false;}
    for(let it=0;it<ITER;it++){
      solve(beams,it===0);
      if(car)solve(car.beams,false);
      collide();
    }
  }
  if(simTime>16){
    for(const b of beams){if(b.broken)continue;const m=MAT[b.mat];let st=b.strain;if(m.cableOnly&&st<0)st=0;
      if(Math.abs(st)>m.maxStrain){b.broken=true;spark(b);} }
  }
  if(car){
    if(car.bd.y>H+90)gameResult='lose';
    else if(car.bd.x>LEVELS[curLevel].goalX)gameResult='win';
    if(gameResult)finishSim();
  }
  for(const s of sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=0.3;s.life--;}
  sparks=sparks.filter(s=>s.life>0);
  simTime++;
}
function solve(list,rec){
  for(const b of list){if(b.broken)continue;
    const a=b.a,c=b.b;let dx=c.x-a.x,dy=c.y-a.y,d=Math.hypot(dx,dy);if(d===0)continue;
    const strain=(d-b.rest)/b.rest;if(rec)b.strain=b.strain*0.5+strain*0.5;
    const m=b.carBeam?{stiff:1,cableOnly:false}:MAT[b.mat];
    if(m.cableOnly&&strain<0)continue;
    const w=a.invMass+c.invMass;if(w===0)continue;
    const diff=((d-b.rest)/d)*m.stiff;
    a.x+=dx*diff*(a.invMass/w);a.y+=dy*diff*(a.invMass/w);
    c.x-=dx*diff*(c.invMass/w);c.y-=dy*diff*(c.invMass/w);
  }
}
function collide(){
  if(!car)return;const L=LEVELS[curLevel];
  for(const w of[car.lw,car.rw]){
    for(const g of L.ground){
      if(w.x>g.x-2&&w.x<g.x+g.w+2&&w.y+car.R>g.y&&w.y<g.y+34){if(w.y<g.y){w.y=g.y-car.R;w._g=true;}}}
    for(const b of beams){
      if(b.broken||!MAT[b.mat].road)continue;
      const a=b.a,c=b.b,dx=c.x-a.x,dy=c.y-a.y,l2=dx*dx+dy*dy;if(!l2)continue;
      let t=((w.x-a.x)*dx+(w.y-a.y)*dy)/l2;t=Math.max(0,Math.min(1,t));
      const qx=a.x+t*dx,qy=a.y+t*dy;let nx=w.x-qx,ny=w.y-qy,dd=Math.hypot(nx,ny);
      if(dd<car.R&&dd>0.001){nx/=dd;ny/=dd;const pen=car.R-dd;
        const wm=w.invMass,sm=(a.invMass+c.invMass)*0.5+1e-4,tot=wm+sm;
        w.x+=nx*pen*(wm/tot);w.y+=ny*pen*(wm/tot);
        const ps=pen*(sm/tot);a.x-=nx*ps*(1-t);a.y-=ny*ps*(1-t);c.x-=nx*ps*t;c.y-=ny*ps*t;
        if(ny<0.4)w._g=true;}
    }
  }
}
function spark(b){const mx=(b.a.x+b.b.x)/2,my=(b.a.y+b.b.y)/2;for(let i=0;i<10;i++)sparks.push({x:mx,y:my,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:24+Math.random()*14});}
function finishSim(){
  const L=LEVELS[curLevel];
  if(gameResult==='win'){const c=totalCost();
    if(best[curLevel]==null||c<best[curLevel]){best[curLevel]=c;localStorage.setItem('pb4_best',JSON.stringify(best));}
    flash('🎉 ATRAVESSOU!','Custo: $'+c+'  •  Recorde: $'+best[curLevel]+(c<=best[curLevel]?'  (novo!)':''));
  }else flash('💥 DESABOU!','A ponte não aguentou. Reforce os pontos vermelhos.');
  running=false;document.getElementById('btnRun').textContent='▶ Simular';
}

/* ===== BANNER ===== */
function flash(t,s){document.getElementById('bttl').textContent=t;document.getElementById('bsub').textContent=s;document.getElementById('banner').classList.add('show');}
document.getElementById('bbtn').onclick=()=>{document.getElementById('banner').classList.remove('show');
  if(car){points=points.filter(p=>!p.car);for(const b of beams){b.broken=false;b.strain=0;}car=null;document.getElementById('hint').style.display='block';updateHUD();}};

/* ===== RENDER ===== */
function strainColor(b){const m=MAT[b.mat];let s=Math.min(1,Math.abs(b.strain)/m.maxStrain);
  const r=Math.round(70+185*Math.min(1,s*1.6)),g=Math.round(210-190*s);return `rgb(${r},${g},80)`;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){
  const L=LEVELS[curLevel],g=ctx.createLinearGradient(0,0,0,H);
  if(L.theme==='day'){g.addColorStop(0,'#5fb3ff');g.addColorStop(.6,'#a9dcff');g.addColorStop(1,'#dff2ff');}
  else if(L.theme==='night'){g.addColorStop(0,'#070f28');g.addColorStop(1,'#1a2c5e');}
  else{g.addColorStop(0,'#2a0808');g.addColorStop(1,'#651711');}
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(L.theme==='day'){
    ctx.fillStyle='#fff3b0';ctx.beginPath();ctx.arc(150,95,46,0,7);ctx.fill();
    ctx.fillStyle='#bfe6c0';hill(0,430,520,120);ctx.fillStyle='#a9dcb0';hill(420,460,640,90);
    ctx.fillStyle='#ffffffd0';cloud(640,90,30);cloud(810,140,24);cloud(420,70,26);
  }else if(L.theme==='night'){
    ctx.fillStyle='#fff';for(let i=0;i<70;i++){ctx.globalAlpha=(i%5)/7+.25;ctx.fillRect((i*149)%W,(i*83)%270,2,2);}ctx.globalAlpha=1;
    ctx.fillStyle='#eef';ctx.beginPath();ctx.arc(830,90,30,0,7);ctx.fill();ctx.fillStyle='#1a2c5e';ctx.beginPath();ctx.arc(843,84,26,0,7);ctx.fill();
    ctx.fillStyle='#12224d';for(let i=0;i<9;i++)ctx.fillRect(30+i*116,260-(i%3)*46,78,210);
  }else{
    ctx.fillStyle='#1a0a08';hill(0,440,1000,130);
    const t=simTime*0.06;ctx.fillStyle='#ff5a2c';ctx.fillRect(0,512,W,48);
    ctx.fillStyle='#ffae3a';for(let x=0;x<W;x+=34){const h=8+Math.abs(Math.sin(t+x))*12;ctx.fillRect(x,512-h,20,h);}
  }
}
function hill(x,y,w,h){ctx.beginPath();ctx.moveTo(x,y+h);ctx.quadraticCurveTo(x+w/2,y-h*0.3,x+w,y+h);ctx.fill();}
function cloud(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.arc(x+r,y+5,r*.8,0,7);ctx.arc(x-r,y+6,r*.7,0,7);ctx.fill();}
function drawGround(){
  const L=LEVELS[curLevel];
  for(const g of L.ground){
    ctx.fillStyle=L.theme==='night'?'#0e1c40':(L.theme==='lava'?'#2a100c':'#6b5236');
    ctx.fillRect(g.x,g.y,g.w,g.h);
    ctx.fillStyle=L.theme==='night'?'#1a2f63':(L.theme==='lava'?'#5a241a':'#4f9a47');
    ctx.fillRect(g.x,g.y,g.w,7);
  }
  // bandeira
  let gy=560;for(const g of L.ground)if(L.goalX>=g.x&&L.goalX<=g.x+g.w)gy=g.y;
  ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(L.goalX,gy);ctx.lineTo(L.goalX,gy-54);ctx.stroke();
  ctx.fillStyle='#2f6df6';ctx.beginPath();ctx.moveTo(L.goalX,gy-54);ctx.lineTo(L.goalX+30,gy-46);ctx.lineTo(L.goalX,gy-38);ctx.fill();
}
function drawGrid(){
  if(running)return;ctx.fillStyle='#ffffff14';
  for(let x=GRID;x<W;x+=GRID)for(let y=GRID;y<540;y+=GRID){if(!onGround(x,y))ctx.fillRect(x-1,y-1,2,2);}
}
function drawBeam(b){
  if(b.broken)return;const m=MAT[b.mat];
  ctx.lineCap='round';ctx.lineWidth=m.w;
  ctx.strokeStyle=running?strainColor(b):m.color;
  if(b.mat==='cable'&&!running)ctx.strokeStyle=m.color;
  ctx.beginPath();ctx.moveTo(b.a.x,b.a.y);ctx.lineTo(b.b.x,b.b.y);ctx.stroke();
  if(m.road){ctx.strokeStyle='#0007';ctx.lineWidth=1.6;ctx.setLineDash([7,7]);ctx.beginPath();ctx.moveTo(b.a.x,b.a.y);ctx.lineTo(b.b.x,b.b.y);ctx.stroke();ctx.setLineDash([]);}
}
function drawCar(){
  if(!car)return;const C=CARS[curCar];
  const lw=car.lw,rw=car.rw,bd=car.bd,ang=Math.atan2(rw.y-lw.y,rw.x-lw.x);
  const cx=(lw.x+rw.x)/2,cy=(lw.y+rw.y)/2;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  const L=C.len,R=car.R;
  ctx.fillStyle=C.color;ctx.strokeStyle='#0008';ctx.lineWidth=2;
  if(curCar==='bike'){rr(-L/2,-14,L,12,6);ctx.fill();}
  else if(curCar==='car'){rr(-L/2,-12,L,12,5);ctx.fill();rr(-L/2+9,-22,L-20,12,5);ctx.fill();
    ctx.fillStyle='#bfe6ff';rr(-L/2+12,-20,L-26,8,3);ctx.fill();}
  else if(curCar==='truck'){rr(-L/2,-16,L*0.72,16,4);ctx.fill();rr(L/2-L*0.3,-26,L*0.3,26,4);ctx.fill();
    ctx.fillStyle='#bfe6ff';rr(L/2-L*0.27,-23,L*0.18,9,2);ctx.fill();}
  else{rr(-L/2,-14,L,14,4);ctx.fill();rr(-L*0.28,-26,L*0.5,14,4);ctx.fill();
    ctx.fillRect(L*0.18,-22,L*0.5,4);} // canhão
  // rodas
  ctx.restore();
  for(const w of[lw,rw]){ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(w.x,w.y,R,0,7);ctx.fill();
    ctx.fillStyle='#777';ctx.beginPath();ctx.arc(w.x,w.y,R*0.42,0,7);ctx.fill();}
}
function draw(){
  drawBg();drawGround();drawGrid();
  for(const b of beams)drawBeam(b);
  for(const p of points){if(p.car)continue;
    if(p.pinned){ctx.fillStyle='#ffd36b';ctx.beginPath();ctx.arc(p.x,p.y,6,0,7);ctx.fill();ctx.strokeStyle='#a87b18';ctx.lineWidth=2;ctx.stroke();}
    else{ctx.fillStyle='#e6edff';ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,7);ctx.fill();}}
  if(drawing&&lastNode){const t=findNode(mouse.x,mouse.y)||snap(mouse.x,mouse.y);
    const len=Math.hypot(t.x-lastNode.x,t.y-lastNode.y);
    ctx.strokeStyle=len>MAX_BEAM?'#ff6b6b':'#ffffffaa';ctx.lineWidth=MAT[curMat].w;ctx.setLineDash([4,5]);
    ctx.beginPath();ctx.moveTo(lastNode.x,lastNode.y);ctx.lineTo(t.x,t.y);ctx.stroke();ctx.setLineDash([]);}
  drawCar();
  for(const s of sparks){ctx.globalAlpha=s.life/38;ctx.fillStyle='#ffd166';ctx.fillRect(s.x,s.y,3,3);}ctx.globalAlpha=1;
}
function loop(){if(running&&!gameResult)physics();draw();requestAnimationFrame(loop);}

/* ===== UI ===== */
document.querySelectorAll('.lvl').forEach(b=>b.onclick=()=>{stopSim();loadLevel(+b.dataset.lvl);});
document.querySelectorAll('.mat').forEach(b=>b.onclick=()=>{curMat=b.dataset.mat;document.querySelectorAll('.mat').forEach(x=>x.classList.toggle('active',x===b));});
document.querySelectorAll('.car').forEach(b=>b.onclick=()=>{if(running)return;curCar=b.dataset.car;document.querySelectorAll('.car').forEach(x=>x.classList.toggle('active',x===b));});
document.getElementById('btnRun').onclick=()=>{running?stopSim():startSim();};
document.getElementById('btnUndo').onclick=()=>{if(running||!history.length)return;const h=history.pop();beams=beams.filter(x=>!h.beams.includes(x));h.pts.forEach(p=>points=points.filter(x=>x!==p));cleanOrphans();updateHUD();};
document.getElementById('btnClear').onclick=()=>{if(running)return;beams=[];points=points.filter(p=>p.pinned);history=[];updateHUD();};
window.addEventListener('keydown',e=>{
  if(e.key==='1')document.querySelector('[data-mat=road]').click();
  if(e.key==='2')document.querySelector('[data-mat=wood]').click();
  if(e.key==='3')document.querySelector('[data-mat=steel]').click();
  if(e.key==='4')document.querySelector('[data-mat=cable]').click();
  if(e.key===' '){e.preventDefault();document.getElementById('btnRun').click();}
  if(e.key==='z'||e.key==='Z')document.getElementById('btnUndo').click();
});
document.querySelector('[data-mat=road]').classList.add('active');
loadLevel(0);loop();
</script>
</body>
